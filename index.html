<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produttività</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=DynaPuff:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <div class="header-row">
        <h1>Produttività</h1>
        <button class="stats-open-btn" onclick="openStats()">Statistiche</button>
    </div>

    <div class="main-content">

        <!-- ===== SINISTRA ===== -->
        <div class="left-panel">

            <div class="top-panel">
                <div class="left-column">
                    <div class="time-row">

                        <div class="stopwatch-box">
                            <div class="stopwatch-title">Cronometro</div>
                            <div class="stopwatch-time" id="stopwatch">00:00</div>
                            <div class="stopwatch-controls">
                                <button class="small-btn" onclick="toggleStopwatch()">Start / Stop</button>
                                <button class="small-btn" onclick="resetStopwatch()">Reset</button>
                            </div>
                        </div>

                        <div class="timer-box">
                            <div class="timer-title">Timer</div>
                            <div class="timer-display" id="timerDisplay">25:00</div>
                            <div class="timer-settings">
                                <div class="step-control">
                                    <button class="arrow-btn" onclick="changeStudy(-5)">←</button>
                                    <input type="number" id="studyMinutes" class="time-input" value="25" min="1">
                                    <button class="arrow-btn" onclick="changeStudy(5)">→</button>
                                </div>
                            </div>
                            <div class="timer-controls">
                                <button class="small-btn" onclick="startTimer()">Start</button>
                                <button class="small-btn" onclick="pauseTimer()">Stop</button>
                                <button class="small-btn" onclick="resetTimer()">Reset</button>
                            </div>
                        </div>

                    </div><!-- fine time-row -->

                    <div class="total-time-wrapper">
                        <button class="arrow-btn" onclick="changeTotalTime(-300)">←</button>
                        <div class="total-time">Tempo Totale: <span id="totalTime">00:00</span></div>
                        <button class="arrow-btn" onclick="changeTotalTime(300)">→</button>
                        <button class="reset-total-btn" onclick="resetTotalTime()">↺</button>
                    </div>
                </div><!-- fine left-column -->

                <div class="right-column">
                    <div class="keypad">
                        <button class="key" onclick="pressNumber(1)">1</button>
                        <button class="key" onclick="pressNumber(2)">2</button>
                        <button class="key" onclick="pressNumber(3)">3</button>
                        <button class="key" onclick="pressNumber(4)">4</button>
                        <button class="key" onclick="pressNumber(5)">5</button>
                        <button class="key" onclick="pressNumber(6)">6</button>
                        <button class="key" onclick="pressNumber(7)">7</button>
                        <button class="key" onclick="pressNumber(8)">8</button>
                        <button class="key" onclick="pressNumber(9)">9</button>
                        <button class="key clear-key" onclick="clearInput()">C</button>
                        <button class="key" onclick="pressNumber(0)">0</button>
                        <button class="key" onclick="applyManualTotal()">✓</button>
                    </div>
                    <div class="counter">Pagine: <span id="counter">0</span></div>
                </div><!-- fine right-column -->
            </div><!-- fine top-panel -->

            <!-- Scatola cioccolatini: gif assoluta a sx, box centrato su X -->
            <div class="box-wrapper">
                <img class="study-gif"
                     src="https://64.media.tumblr.com/a86753dba21858536a4d4507fd96df87/9c6995b07d21774e-b4/s500x750/92f32f6605203b5f21c18e0d5faf1608409a4fc2.gif"
                     alt="studio">
                <div class="current-box-area">
                    <div class="box" id="mainBox"></div>
                </div>
            </div>

            <div class="controls">
                <button class="add-btn"    onclick="addChocolate()">➕ Aggiungi</button>
                <button class="remove-btn" onclick="removeChocolate()">➖ Rimuovi</button>
            </div>

        </div><!-- fine left-panel -->

        <!-- ===== DESTRA ===== -->
        <div class="right-panel">

            <div class="stats-box">
                <div class="stats-title">Velocità media</div>
                <div class="stats-value" id="speedValue">0 pag/h</div>
            </div>

            <div class="completed-section">
                <div class="completed-title">Scatole completate</div>
                <div class="completed-boxes" id="completedBoxes"></div>
            </div>

        </div><!-- fine right-panel -->

    </div><!-- fine main-content -->

</div><!-- fine app-container -->

<!-- ===== OVERLAY STATISTICHE ===== -->
<div class="stat-overlay stat-overlay--hidden" id="statsOverlay">
    <div class="stat-page">

        <div class="stat-topbar">
            <h2 class="stat-heading">Statistiche</h2>
            <button class="stat-close-btn" onclick="closeStats()">✕</button>
        </div>

        <div class="stat-controls">
            <div class="period-tabs">
                <button class="period-tab period-tab--active" data-mode="week"  onclick="setStatsMode('week')">Settimana</button>
                <button class="period-tab"                    data-mode="month" onclick="setStatsMode('month')">Mese</button>
                <button class="period-tab"                    data-mode="year"  onclick="setStatsMode('year')">Anno</button>
            </div>
            <div class="period-nav">
                <button class="nav-arrow" onclick="changeStatsPeriod(-1)">←</button>
                <span class="period-label" id="periodLabel">—</span>
                <button class="nav-arrow" onclick="changeStatsPeriod(1)">→</button>
            </div>
        </div>

        <div class="stat-totals">
            <div class="stat-total-card">
                <div class="stat-total-label">📖 Pagine studiate</div>
                <div class="stat-total-value" id="statsTotalPages">0</div>
            </div>
            <div class="stat-total-card">
                <div class="stat-total-label">⏱ Ore di studio</div>
                <div class="stat-total-value" id="statsTotalHours">0h 00m</div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-card-title">Pagine studiate</div>
                <div class="chart-wrap"><canvas id="pagesChart"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-card-title">Tempo di studio (ore)</div>
                <div class="chart-wrap"><canvas id="timeChart"></canvas></div>
            </div>
        </div>

        <div class="edit-section">
            <button class="edit-toggle-btn" onclick="toggleEdit()">✏️ Modifica registrazioni</button>
            <div id="editArea" class="edit-area edit-area--hidden"></div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
